rules:
  # 1. No hardcoded API keys
  - id: no-hardcoded-api-keys
    languages: [python]
    message: "Hardcoded API keys are forbidden. Use environment variables."
    severity: ERROR
    patterns:
      - pattern: |
          $KEY = $VALUE
      - metavariable-regex:
          metavariable: $KEY
          regex: ".*API_KEY.*"
      - pattern-not: |
          $KEY = os.environ.get($ENV)

  # 2. No direct file deletes
  - id: no-direct-file-deletes
    languages: [python]
    message: "Do not call delete operations directly. Use ExecutionNode with HITL + rollback."
    severity: ERROR
    pattern-either:
      - pattern: os.remove($PATH)
      - pattern: os.unlink($PATH)
      - pattern: shutil.rmtree($PATH)
      - pattern: $PATH.unlink()

  # 3. Never delete sensitive files
  - id: no-delete-sensitive-files
    languages: [python]
    message: "Sensitive files must never be deleted. They must be moved to Authenticated/."
    severity: ERROR
    patterns:
      - pattern: |
          if $SENSITIVE:
              os.remove($PATH)
      - metavariable-regex:
          metavariable: $SENSITIVE
          regex: "is_sensitive|sensitive"

  # 4. No system folder access
  - id: no-system-folder-access
    languages: [python]
    message: "System folders must never be scanned or modified."
    severity: ERROR
    patterns:
      - pattern: |
          $FUNC($PATH, ...)
      - metavariable-regex:
          metavariable: $PATH
          regex: ".*/(Windows|System32|Program Files|Library|usr)/.*"

  # 5. Enforce Folder Scope Policy
  - id: file-ops-must-use-folder-scope
    languages: [python]
    message: "File operations must respect folder_scope_policy and allowed_paths."
    severity: WARNING
    patterns:
      - pattern: |
          open($PATH, $MODE)
      - pattern-not: |
          if folder_scope_policy.is_path_allowed($PATH):
              open($PATH, $MODE)

  # 6. No file content uploads
  - id: no-file-content-upload
    languages: [python]
    message: "Do not upload raw file contents to external services without permission."
    severity: ERROR
    pattern-either:
      - pattern: 'requests.post(..., files={"file": open($PATH, "rb")})'
      - pattern: 'client.upload_file(open($PATH, "rb"))'

  # 7. Safe mode: no deletes or compress
  - id: safe-mode-no-deletes-or-compress
    languages: [python]
    message: "In safe_mode, deletes and compress actions are forbidden."
    severity: ERROR
    patterns:
      - pattern: |
          if safe_mode:
              $DELETE($ARGS)
      - metavariable-regex:
          metavariable: $DELETE
          regex: "os.remove|shutil.rmtree|compress_file"

  # 8. Sensitive files must go to Authenticated/
  - id: sensitive-files-to-authenticated
    languages: [python]
    message: "Sensitive files must be moved to Authenticated/, not deleted or compressed."
    severity: WARNING
    patterns:
      - pattern: |
          if is_sensitive:
              $ACTION($PATH)
      - pattern-not: |
          if is_sensitive:
              move_to_authenticated($PATH)

  # 9. Destructive actions require rollback metadata
  - id: destructive-actions-require-rollback
    languages: [python]
    message: "Destructive actions must include rollback_supported=True."
    severity: WARNING
    patterns:
      - pattern: |
          CleanupAction(
              action_type=$TYPE,
              path=$PATH,
              ...
          )
      - pattern-not: |
          CleanupAction(
              action_type=$TYPE,
              path=$PATH,
              ...,
              rollback_supported=True,
          )

  # 10. ExecutionNode must not bypass HITL
  - id: no-direct-execution-without-hitl
    languages: [python]
    message: "ExecutionNode must only run after HITLApprovalNode for cleanup."
    severity: WARNING
    patterns:
      - pattern: |
          n_exec = ExecutionNode(...)
      - pattern-not: |
          workflow = Workflow(
              start=n_assistant,
              edges=[
                  Edge(source=n_planner, target=n_hitl),
                  Edge(source=n_hitl, route="approved", target=n_exec),
              ],
          )

  # 11. No file-content reading
  - id: no-file-content-reading
    languages: [python]
    message: "Reading file contents is forbidden. Metadata-only mode enforced."
    severity: ERROR
    pattern-either:
      - pattern: open($PATH, "r")
      - pattern: open($PATH, "rb")
      - pattern: $OBJ.read()
      - pattern: $OBJ.readlines()
      - pattern: PyPDF2.PdfReader($PATH)

  # 12. No content upload to LLM
  - id: no-content-upload-to-llm
    languages: [python]
    message: "LLM must never receive file contents. Only metadata is allowed."
    severity: ERROR
    pattern-either:
      - pattern: client.models.generate_content(..., contents=open($PATH, ...), ...)
      - pattern: client.models.generate_content(..., contents=$CONTENT, ...)

  # 13. No sensitive data in logs
  - id: no-sensitive-data-in-logs
    languages: [python]
    message: "Logs must be redacted before writing. Never log sensitive paths or filenames."
    severity: ERROR
    patterns:
      - pattern: write_log($DATA)
      - pattern-not: write_log(redact($DATA))

  # 14. No direct config paths
  - id: no-direct-config-paths
    languages: [python]
    message: "Do not hardcode configuration directories or files. Use CONFIG_DIR, CONFIG_FILE, or POLICY_FILE constants from app.config."
    severity: ERROR
    pattern-either:
      - pattern: '"/.cleanslate"'
      - pattern: '"/config.json"'
      - pattern: '"/policy.json"'
      - pattern: '".cleanslate/config.json"'
      - pattern: '".cleanslate/policy.json"'

  # 15. No absolute paths in CLI output
  - id: no-absolute-paths-in-cli-output
    languages: [python]
    message: "Do not display absolute paths in CLI console outputs. Print relative or redacted paths."
    severity: WARNING
    patterns:
      - pattern: print(..., $PATH, ...)
      - metavariable-regex:
          metavariable: $PATH
          regex: ".*(absolute_path|abs_path).*"

  # 16. Registry must be pure
  - id: registry-no-policy-checks
    languages: [python]
    message: "The Tool Registry must remain pure. It must not touch the filesystem, read policies, or import app.config."
    severity: ERROR
    paths:
      include: ["**/app/mcp_tools/registry.py"]
    pattern-either:
      - pattern: is_path_allowed_by_policy(...)
      - pattern: open(...)
      - pattern: import app.config
      - pattern: from app.config import $X

  # 17. No symlink following
  - id: no-symlink-following
    languages: [python]
    message: "Explicit symlink following is disabled for safety. Do not set followlinks=True."
    severity: ERROR
    pattern: os.walk(..., followlinks=True)

  # 18. No unsafe shutil move
  - id: no-unsafe-shutil-move
    languages: [python]
    message: "Calling shutil.move directly is unsafe without prior path scope validations."
    severity: WARNING
    paths:
      include: ["**/app/mcp_tools/**"]
    patterns:
      - pattern: shutil.move($SRC, $DST)
      - pattern-not-inside: |
          validate_path_safety(...)
          ...
          shutil.move($SRC, $DST)

  # 19. No absolute path return
  - id: no-absolute-path-return
    languages: [python]
    message: "Do not expose absolute path parameters in error outputs or logged messages."
    severity: WARNING
    pattern: raise ValueError(..., os.path.abspath(...), ...)

  # 20. No directory traversal
  - id: no-directory-traversal
    languages: [python]
    message: "Enforce directory traversal checks on raw file paths before performing file access."
    severity: ERROR
    paths:
      include: ["**/app/mcp_tools/**"]
    patterns:
      - pattern: open($PATH, ...)
      - pattern-not-inside: |
          validate_path_safety($PATH)
          ...
          open($PATH, ...)



