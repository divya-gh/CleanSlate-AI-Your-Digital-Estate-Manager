<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanSlate AI — Your Digital Estate Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c10;
      --surface:   #121420;
      --surface2:  #171b26;
      --surface3:  #1f2433;
      --border:    #23283c;
      --accent:    #38bdf8;
      --accent2:   #818cf8;
      --text:      #f1f5f9;
      --text-dim:  #64748b;
      --user-bg:   #312e81;
      --agent-bg:  #171b26;
      --success:   #34d399;
      --danger:    #f87171;
      --radius:    16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.08), transparent 40%),
                  radial-gradient(circle at 90% 90%, rgba(167, 139, 250, 0.08), transparent 40%),
                  var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 42px; height: 42px;
      background: #0f111a;
      border: 2px solid transparent;
      background-image: linear-gradient(#0f111a, #0f111a), linear-gradient(135deg, #00f2fe, #4facfe, #a83279, #f43f5e);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #38bdf8;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
    }
    .header-text h1 { font-size: 15px; font-weight: 600; }
    .header-text p  { font-size: 12px; color: var(--accent); margin-top: 1px; }
    .header-icons-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-icon {
      color: var(--text-dim);
      position: relative;
    }
    .header-icon::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 6px;
      width: 6px;
      height: 6px;
      background: #f43f5e;
      border-radius: 50%;
    }
    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1e293b;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 12px; max-width: 800px; width: 100%; }
    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .msg.agent .avatar {
      background: #0f111a;
      border: 1.5px solid transparent;
      background-image: linear-gradient(#0f111a, #0f111a), linear-gradient(135deg, #a78bfa, #c084fc);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      color: #c084fc;
      font-weight: 700;
      box-shadow: 0 0 10px rgba(192, 132, 252, 0.4);
    }
    .msg.user .avatar {
      background: #1e293b;
      border: 1px solid var(--border);
      color: #94a3b8;
      font-weight: 600;
    }
    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.agent .bubble {
      background: #171b26;
      border: 1.5px solid transparent;
      background-image: linear-gradient(#171b26, #171b26), linear-gradient(135deg, #00f2fe, #4facfe, #818cf8);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      border-top-left-radius: 4px;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
      color: #e2e8f0;
    }
    .msg.user .bubble {
      background: #312e81;
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-top-right-radius: 4px;
      color: #e0e7ff;
      box-shadow: 0 0 15px rgba(49, 46, 129, 0.2);
    }
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .typing .bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce .9s infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: .15s; }
    .typing .bubble span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    footer {
      padding: 14px 20px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #171b26;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 6px 12px;
      transition: border-color .25s, box-shadow .25s;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .input-row:focus-within {
      border-color: #818cf8;
      box-shadow: 0 0 15px rgba(129, 140, 248, 0.25);
    }
    .input-controls-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: var(--text-dim);
      transition: background .2s, color .2s;
    }
    .icon-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 0;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #input::placeholder { color: var(--text-dim); }
    #send {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
    }
    #send:hover  { opacity: .85; }
    #send:active { transform: scale(.93); }
    #send svg    { width: 18px; height: 18px; fill: #fff; }
    #send:disabled { opacity: .35; cursor: not-allowed; }
    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .hint {
      font-size: 11px;
      color: var(--text-dim);
    }
    .datetime-text {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }

    /* ORGANIZE_MODE Widgets */
    .widget-wrap {
      display: flex;
      gap: 10px;
      max-width: 800px;
      width: 100%;
    }
    .widget-wrap .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
    }
    .widget-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 18px 20px;
      flex: 1;
      min-width: 0;
    }
    .widget-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .folder-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .folder-list::-webkit-scrollbar { width: 3px; }
    .folder-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .folder-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      background: var(--surface2);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .folder-item:hover { border-color: var(--border); }
    .folder-item.checked   { border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.07); }
    .folder-item.unchecked { border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.05); }
    .folder-checkbox {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      transition: background .15s, border-color .15s;
    }
    .folder-item.checked   .folder-checkbox { background: var(--success); border-color: var(--success); color: #000; }
    .folder-item.unchecked .folder-checkbox { background: rgba(248,113,113,.2); border-color: var(--danger); color: var(--danger); }
    .folder-icon { font-size: 15px; flex-shrink: 0; }
    .folder-path {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .folder-item.unchecked .folder-path { color: var(--text-dim); text-decoration: line-through; }
    .folder-status {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .folder-item.checked   .folder-status { background: rgba(52,211,153,.15); color: var(--success); }
    .folder-item.unchecked .folder-status { background: rgba(248,113,113,.15); color: var(--danger); }
    .widget-legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .widget-legend span { display: flex; align-items: center; gap: 5px; }
    .widget-submit {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 9px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .widget-submit:hover  { opacity: .88; }
    .widget-submit:active { transform: scale(.98); }
    .widget-submit:disabled { opacity: .4; cursor: not-allowed; }
    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    .toggle-btn {
      padding: 14px 12px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      text-align: center;
      line-height: 1.3;
    }
    .toggle-btn:hover { border-color: var(--accent); background: var(--surface3); }
    .toggle-btn:active { transform: scale(.97); }
    .toggle-btn.primary {
      border-color: var(--success);
      background: rgba(52,211,153,.1);
    }
    .toggle-btn.primary:hover { background: rgba(52,211,153,.18); }
    .toggle-btn.secondary {
      border-color: var(--danger);
      background: rgba(248,113,113,.08);
    }
    .toggle-btn.secondary:hover { background: rgba(248,113,113,.15); }
    .toggle-btn:disabled { opacity: .4; cursor: not-allowed; }
    .toggle-desc {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Table Widget Styling */
    .widget-table-container {
      width: 100%;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
    }
    .widget-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
      min-width: 500px;
    }
    .widget-table th {
      background: var(--surface3);
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
    }
    .widget-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .widget-table tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">CS</div>
  <div class="header-text">
    <h1>CleanSlate AI</h1>
    <p>Your Digital Estate Manager</p>
  </div>
  <div class="header-icons-right">
    <button class="icon-btn header-icon" title="Notifications">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    </button>
    <div class="user-avatar" title="User Profile">U</div>
  </div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <div class="input-controls-left">
      <button class="icon-btn" title="Attach file">
        <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v10c0 4.41-3.59 8-8 8s-8-3.59-8-8V6h2v9c0 3.31 2.69 6 6 6s6-2.69 6-6V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 1.1.9 2 2 2s2-.9 2-2V6h2z"/></svg>
      </button>
      <button class="icon-btn" title="Voice command">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>
    <textarea id="input" rows="1" placeholder="Type a message or command..." disabled></textarea>
    <button id="send" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-bottom">
    <p class="hint">CleanSlate AI never reads file contents &middot; metadata only &middot; all actions require approval</p>
    <div id="datetime-display" class="datetime-text">Loading date...</div>
  </div>
</footer>

<script>
const ADK  = '';
const APP  = 'cleanslate_ai_my_pc_assistant';
const USER = 'user';

const chat  = document.getElementById('chat');
const input = document.getElementById('input');
const send  = document.getElementById('send');

let sessionId    = null;
let pendingIid   = null;
let busy         = false;
let widgetActive = false;

function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function formatMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  
  // Bold: **text**
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Bold: *text* (Mockup image uses single asterisk for items)
  html = html.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  // Newlines
  html = html.replace(/\n/g, '<br>');
  return html;
}

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'agent' ? 'CS' : 'U';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  
  if (role === 'agent' && text && text.includes('__TABLE__\n')) {
    const parts = text.split('__TABLE__\n');
    
    // 1. Text before table
    if (parts[0].trim()) {
      const p = document.createElement('div');
      p.innerHTML = formatMarkdown(parts[0]);
      bub.appendChild(p);
    }
    
    // 2. Parse and render table
    const rest = parts[1];
    const nl = rest.indexOf('\n');
    const jsonStr = nl >= 0 ? rest.slice(0, nl) : rest;
    const postText = nl >= 0 ? rest.slice(nl + 1) : '';
    
    try {
      const rawJson = JSON.parse(jsonStr);
      const tableData = rawJson.__TABLE__ ? rawJson.__TABLE__ : rawJson;
      const tableContainer = document.createElement('div');
      tableContainer.className = 'widget-table-container';
      
      const table = document.createElement('table');
      table.className = 'widget-table';
      
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      (tableData.columns || []).forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);
      
      const tbody = document.createElement('tbody');
      (tableData.rows || []).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          if (typeof val === 'string' && (val.includes('/') || val.includes('\\'))) {
            td.title = val;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableContainer.appendChild(table);
      bub.appendChild(tableContainer);
    } catch(e) {
      // Fallback if parsing fails
      const fallbackDiv = document.createElement('div');
      fallbackDiv.innerHTML = formatMarkdown(text);
      bub.appendChild(fallbackDiv);
    }
    
    // 3. Text after table
    if (postText.trim()) {
      const p = document.createElement('div');
      p.innerHTML = formatMarkdown(postText);
      p.style.marginTop = '10px';
      bub.appendChild(p);
    }
  } else {
    bub.innerHTML = formatMarkdown(text);
  }
  
  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollBottom();
  return bub;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg agent typing';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setReady(ok) {
  const inputOk = ok && !widgetActive;
  input.disabled = !inputOk;
  send.disabled  = !inputOk;
  busy = !ok;
  if (inputOk) input.focus();
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
send.addEventListener('click', handleSend);

/* ORGANIZE_MODE Widget System */

function parseInterruptMsg(msg) {
  if (!msg) return null;

  const segments = msg.split('\n');
  let tableData = null;
  let toggleData = null;
  let checkboxData = null;
  let checkboxLabel = '';

  for (let i = 0; i < segments.length; i++) {
    const line = segments[i];
    if (line.startsWith('__TABLE__')) {
      try {
        const rawJson = JSON.parse(segments[i + 1]);
        if (rawJson.__TABLE__) {
          tableData = rawJson.__TABLE__;
        } else {
          tableData = rawJson;
        }
      } catch (e) {}
    } else if (line.startsWith('__TOGGLE_SELECT__')) {
      try {
        toggleData = JSON.parse(segments[i + 1]);
      } catch (e) {}
    } else if (line.startsWith('__CHECKBOX_SELECT__')) {
      try {
        checkboxData = JSON.parse(segments[i + 1]);
        checkboxLabel = segments.slice(i + 2).join('\n');
      } catch (e) {}
    }
  }

  if (checkboxData) {
    return { type: 'checkbox', data: checkboxData, label: checkboxLabel };
  }
  if (tableData) {
    return { type: 'table_with_toggle', table: tableData, toggle: toggleData };
  }
  if (toggleData) {
    return { type: 'toggle', data: toggleData };
  }
  return null;
}

function dismissWidget() {
  const w = document.getElementById('active-widget');
  if (w) w.remove();
  widgetActive = false;
}

function renderCheckboxWidget(data, label, iid) {
  widgetActive = true;
  setReady(false);

  const subfolders = (data.subfolders || []);
  const count      = data.count || subfolders.length;
  const parent     = data.parent || '';
  const state      = subfolders.map(p => ({ path: p, checked: true }));

  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  wrap.id = 'active-widget';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);

  const card = document.createElement('div');
  card.className = 'widget-card';

  // Title: folder count
  const title = document.createElement('div');
  title.className = 'widget-title';
  title.style.color = 'var(--accent)';
  title.textContent = String.fromCodePoint(0x1F4C1) + ' Select Folders to Organize (' + count + ' found)';
  card.appendChild(title);

  // Parent path subtitle
  if (parent) {
    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:12px;color:#38bdf8;margin-bottom:10px;word-break:break-all;';
    sub.textContent = String.fromCodePoint(0x1F4CD) + ' Scanning: ' + parent;
    card.appendChild(sub);
  }

  const legend = document.createElement('div');
  legend.className = 'widget-legend';
  legend.innerHTML =
    '<span><span style="color:var(--success)">&#10003;</span>&nbsp;Organize this folder</span>' +
    '<span><span style="color:var(--danger)">&#10005;</span>&nbsp;Never touch</span>';
  card.appendChild(legend);

  const list = document.createElement('div');
  list.className = 'folder-list';
  card.appendChild(list);

  function buildItems() {
    list.innerHTML = '';
    state.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'folder-item ' + (item.checked ? 'checked' : 'unchecked');
      const parts = item.path.replace(/\\/g, '/').split('/');
      const name  = parts[parts.length - 1] || item.path;
      const cb = document.createElement('div');
      cb.className = 'folder-checkbox';
      cb.textContent = item.checked ? '\u2713' : '\u2715';
      const icon = document.createElement('div');
      icon.className = 'folder-icon';
      icon.textContent = String.fromCodePoint(0x1F4C1);
      const path = document.createElement('div');
      path.className = 'folder-path';
      path.title = item.path;
      path.textContent = name;
      const status = document.createElement('div');
      status.className = 'folder-status';
      status.textContent = item.checked ? 'Organize' : 'Skip';
      row.appendChild(cb);
      row.appendChild(icon);
      row.appendChild(path);
      row.appendChild(status);
      row.addEventListener('click', () => {
        state[idx].checked = !state[idx].checked;
        buildItems();
      });
      list.appendChild(row);
    });
  }

  buildItems();

  // "Try a different folder" button (always shown so user can correct the path)
  const rescanRow = document.createElement('div');
  rescanRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';
  const rescanBtn = document.createElement('button');
  rescanBtn.style.cssText = 'background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-dim);font-family:inherit;font-size:12px;padding:6px 12px;cursor:pointer;';
  rescanBtn.textContent = '\uD83D\uDD04 Scan a different folder';
  rescanBtn.addEventListener('click', () => {
    dismissWidget();
    // Re-ask for parent_folder by sending a special token that the agent treats as a new path request
    addMsg('user', '(scanning a different folder)');
    // Send empty string + special signal — the agent step shows re-enter prompt
    runSSE('__RESCAN__');
  });
  rescanRow.appendChild(rescanBtn);
  card.appendChild(rescanRow);

  const submitBtn = document.createElement('button');
  submitBtn.className = 'widget-submit';
  submitBtn.id = 'widget-submit';
  submitBtn.textContent = 'Confirm Selection \u2192';
  submitBtn.addEventListener('click', () => {
    const organized   = state.filter(i => i.checked).map(i => i.path);
    const never_touch = state.filter(i => !i.checked).map(i => i.path);
    const selection   = JSON.stringify({ organized, never_touch });

    const orgNames  = organized.map(p => { const ps = p.replace(/\\/g,'/').split('/'); return String.fromCodePoint(0x1F4C1)+' '+(ps[ps.length-1]||p); });
    const skipNames = never_touch.map(p => { const ps = p.replace(/\\/g,'/').split('/'); return String.fromCodePoint(0x1F4C1)+' '+(ps[ps.length-1]||p); });
    const summary = [
      organized.length   ? '\u2714 Organize: ' + orgNames.join(', ')  : '',
      never_touch.length ? '\u2716 Skip: '     + skipNames.join(', ') : '',
    ].filter(Boolean).join('\n');

    dismissWidget();
    addMsg('user', summary || '(No folders selected)');
    runSSE(selection);
  });
  card.appendChild(submitBtn);

  wrap.appendChild(av);
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollBottom();
}

function renderToggleWidget(data, iid) {
  widgetActive = true;
  setReady(false);

  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  wrap.id = 'active-widget';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);

  const card = document.createElement('div');
  card.className = 'widget-card';

  const title = document.createElement('div');
  title.className = 'widget-title';
  title.textContent = data.question || 'Choose an option';
  card.appendChild(title);

  if (data.description) {
    const desc = document.createElement('div');
    desc.className = 'toggle-desc';
    desc.textContent = data.description;
    card.appendChild(desc);
  }

  const grid = document.createElement('div');
  grid.className = 'toggle-grid';

  (data.options || []).forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn ' + (idx === 0 ? 'primary' : 'secondary');
    btn.textContent = opt.label;
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.toggle-btn').forEach(b => b.disabled = true);
      dismissWidget();
      addMsg('user', opt.label);
      runSSE(opt.value);
    });
    grid.appendChild(btn);
  });

  card.appendChild(grid);
  wrap.appendChild(av);
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollBottom();
}

function renderTableWithToggleWidget(tableData, toggleData, iid) {
  widgetActive = true;
  setReady(false);

  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  wrap.id = 'active-widget';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);

  const card = document.createElement('div');
  card.className = 'widget-card';

  // 1. Render Table
  const tableContainer = document.createElement('div');
  tableContainer.className = 'widget-table-container';

  const table = document.createElement('table');
  table.className = 'widget-table';

  // Thead
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  (tableData.columns || []).forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Tbody
  const tbody = document.createElement('tbody');
  (tableData.rows || []).forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(val => {
      const td = document.createElement('td');
      td.textContent = val;
      if (typeof val === 'string' && (val.includes('/') || val.includes('\\'))) {
        td.title = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableContainer.appendChild(table);
  card.appendChild(tableContainer);

  // 2. Render Toggle buttons if present
  if (toggleData) {
    const title = document.createElement('div');
    title.className = 'widget-title';
    title.style.marginTop = '15px';
    title.textContent = toggleData.question || 'Choose an option';
    card.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'toggle-grid';

    (toggleData.options || []).forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn ' + (idx === 0 ? 'primary' : 'secondary');
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        grid.querySelectorAll('.toggle-btn').forEach(b => b.disabled = true);
        dismissWidget();
        addMsg('user', opt.label);
        runSSE(opt.value);
      });
      grid.appendChild(btn);
    });
    card.appendChild(grid);
  }

  wrap.appendChild(av);
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollBottom();
}

/* SSE runner */
async function runSSE(message) {
  if (busy) return;
  busy = true;
  setReady(false);
  showTyping();

  const body = pendingIid !== null
    ? {
        app_name: APP, user_id: USER, session_id: sessionId,
        new_message:   { role: 'user', parts: [{ text: message }] },
        resume_inputs: { [pendingIid]: message }
      }
    : {
        app_name: APP, user_id: USER, session_id: sessionId,
        new_message: { role: 'user', parts: [{ text: message }] }
      };
  pendingIid = null;

  try {
    const resp = await fetch(ADK + '/run_sse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    removeTyping();

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let bestResponse = '';
    let requestMsg   = '';
    let requestIid   = null;
    // Track whether we've seen a structured output (prefer it over LLM text)
    let gotStructured = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const json = line.slice(5).trim();
        if (!json || json === '[DONE]') continue;
        let ev;
        try { ev = JSON.parse(json); } catch { continue; }

        // --- HITL interrupt (functionCall from ADK) ---
        const fc = ev && ev.content && ev.content.parts && ev.content.parts[0] && ev.content.parts[0].functionCall;
        if (fc) {
          const iid = fc.id || (fc.args && fc.args.interruptId);
          const msg = (fc.args && fc.args.message) || '';
          if (iid) {
            requestIid = iid;
            requestMsg = msg;
            // Once we know this is a HITL turn, stop using LLM text as response
            gotStructured = true;
          }
          continue;
        }

        // --- Older ADK interrupt format ---
        if (ev && (ev.type === 'request_input' || ev.interrupt_id)) {
          requestMsg = ev.message || ev.interrupt_message || '';
          requestIid = ev.interrupt_id || null;
          gotStructured = true;
          continue;
        }

        // --- Structured node output (most reliable, always prefer) ---
        const structOut =
          (ev && ev.output && ev.output.human_readable_report) ||
          (ev && ev.output && ev.output.message)               ||
          (ev && ev.output && ev.output.conversational_response) ||
          (ev && ev.output && ev.output.summary_report);

        if (structOut) {
          bestResponse = structOut;
          gotStructured = true;
          requestIid = null;
          requestMsg = '';
          continue;
        }

        // --- Fallback: LLM streaming text (only use if no structured output yet) ---
        if (!gotStructured) {
          const textOut = ev && ev.content && ev.content.parts && ev.content.parts[0] && ev.content.parts[0].text;
          if (textOut) bestResponse = textOut;
        }

        // --- Fallback: scan any output field for a usable string ---
        if (!gotStructured && ev && ev.output && typeof ev.output === 'object') {
          for (const val of Object.values(ev.output)) {
            if (typeof val === 'string' && val.trim().length > 20) { bestResponse = val; break; }
          }
        }
      }
    }

    if (requestIid !== null) {
      pendingIid = requestIid;
      const parsed = parseInterruptMsg(requestMsg);
      if (parsed && parsed.type === 'checkbox') {
        renderCheckboxWidget(parsed.data, parsed.label, requestIid);
      } else if (parsed && parsed.type === 'toggle') {
        renderToggleWidget(parsed.data, requestIid);
      } else if (parsed && parsed.type === 'table_with_toggle') {
        renderTableWithToggleWidget(parsed.table, parsed.toggle, requestIid);
      } else {
        if (requestMsg) addMsg('agent', requestMsg);
        setReady(true);
      }
    } else if (bestResponse) {
      addMsg('agent', bestResponse);
      setReady(true);
    } else {
      addMsg('agent', '(No response received. Please try again.)');
      setReady(true);
    }

  } catch (err) {
    removeTyping();
    addMsg('agent', String.fromCodePoint(0x26A0) + ' Connection error: ' + err.message);
    setReady(true);
  }

  busy = false;
}

async function handleSend() {
  const text = input.value.trim();
  if (!text || busy || widgetActive) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  await runSSE(text);
}

const WELCOME = '👋 Hi! I\u2019m **CleanSlate AI**\n\nYour **Digital Estate Manager**. How can I streamline your workspace today?\n I can help you with:\n📂 **File Search** (Locate documents, photos, and apps instantly)\n🧹 **Declutter** (Optimize storage and remove duplicates)\n🔒 **Vaulting Sensitive Docs** (Secure confidential files with encryption)\n📅 **Run Weekly Scheduling** (Auto organize your tasks) \n\nYou can say: **"Organize my computer"** to get started.';

function updateDateTime() {
  const now = new Date();
  const dayStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
  const display = document.getElementById('datetime-display');
  if (display) display.textContent = `${dayStr} | ${timeStr}`;
}

async function boot() {
  updateDateTime();
  setInterval(updateDateTime, 30000);
  addMsg('agent', WELCOME);
  try {
    const sr = await fetch(ADK + '/apps/' + APP + '/users/' + USER + '/sessions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
    });
    const sess = await sr.json();
    sessionId = sess.id || sess.session_id;
    setReady(true);
  } catch (err) {
    addMsg('agent', '⚠️ Could not connect to CleanSlate AI backend.\nMake sure `python run.py` is running.\n\nError: ' + err.message);
  }
}

boot();
