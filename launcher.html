<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanSlate AI — My PC Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --surface3:  #2a2f47;
      --border:    #2e3250;
      --accent:    #6c8fff;
      --accent2:   #a78bfa;
      --text:      #e8eaf6;
      --text-dim:  #7b82a8;
      --user-bg:   #1e2a5e;
      --agent-bg:  #1a1d27;
      --success:   #34d399;
      --danger:    #f87171;
      --radius:    14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-text h1 { font-size: 15px; font-weight: 600; }
    .header-text p  { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-dim);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 10px; max-width: 800px; width: 100%; }
    .msg.user { flex-direction: row-reverse; margin-left: auto; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .msg.agent .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .msg.user  .avatar { background: var(--user-bg); border: 1px solid var(--border); }
    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(108,143,255,.3);
      border-top-right-radius: 4px;
      color: #c7d2fe;
    }
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .typing .bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce .9s infinite;
    }
    .typing .bubble span:nth-child(2) { animation-delay: .15s; }
    .typing .bubble span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    footer {
      padding: 14px 20px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px 4px 4px 14px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 0;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #input::placeholder { color: var(--text-dim); }
    #send {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .1s;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 2px;
    }
    #send:hover  { opacity: .85; }
    #send:active { transform: scale(.93); }
    #send svg    { width: 18px; height: 18px; fill: #fff; }
    #send:disabled { opacity: .35; cursor: not-allowed; }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }

    /* ORGANIZE_MODE Widgets */
    .widget-wrap {
      display: flex;
      gap: 10px;
      max-width: 800px;
      width: 100%;
    }
    .widget-wrap .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      flex-shrink: 0;
    }
    .widget-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 18px 20px;
      flex: 1;
      min-width: 0;
    }
    .widget-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .folder-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .folder-list::-webkit-scrollbar { width: 3px; }
    .folder-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .folder-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      background: var(--surface2);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .folder-item:hover { border-color: var(--border); }
    .folder-item.checked   { border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.07); }
    .folder-item.unchecked { border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.05); }
    .folder-checkbox {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 11px;
      transition: background .15s, border-color .15s;
    }
    .folder-item.checked   .folder-checkbox { background: var(--success); border-color: var(--success); color: #000; }
    .folder-item.unchecked .folder-checkbox { background: rgba(248,113,113,.2); border-color: var(--danger); color: var(--danger); }
    .folder-icon { font-size: 15px; flex-shrink: 0; }
    .folder-path {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .folder-item.unchecked .folder-path { color: var(--text-dim); text-decoration: line-through; }
    .folder-status {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .folder-item.checked   .folder-status { background: rgba(52,211,153,.15); color: var(--success); }
    .folder-item.unchecked .folder-status { background: rgba(248,113,113,.15); color: var(--danger); }
    .widget-legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .widget-legend span { display: flex; align-items: center; gap: 5px; }
    .widget-submit {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 9px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .widget-submit:hover  { opacity: .88; }
    .widget-submit:active { transform: scale(.98); }
    .widget-submit:disabled { opacity: .4; cursor: not-allowed; }
    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    .toggle-btn {
      padding: 14px 12px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      text-align: center;
      line-height: 1.3;
    }
    .toggle-btn:hover { border-color: var(--accent); background: var(--surface3); }
    .toggle-btn:active { transform: scale(.97); }
    .toggle-btn.primary {
      border-color: var(--success);
      background: rgba(52,211,153,.1);
    }
    .toggle-btn.primary:hover { background: rgba(52,211,153,.18); }
    .toggle-btn.secondary {
      border-color: var(--danger);
      background: rgba(248,113,113,.08);
    }
    .toggle-btn.secondary:hover { background: rgba(248,113,113,.15); }
    .toggle-btn:disabled { opacity: .4; cursor: not-allowed; }
    .toggle-desc {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Table Widget Styling */
    .widget-table-container {
      width: 100%;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
    }
    .widget-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
      min-width: 500px;
    }
    .widget-table th {
      background: var(--surface3);
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
    }
    .widget-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .widget-table tr:last-child td {
      border-bottom: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">&#x1F5A5;</div>
  <div class="header-text">
    <h1>CleanSlate AI</h1>
    <p>My PC Assistant</p>
  </div>
  <div class="status-dot"><span class="dot"></span> Online</div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder='Say "Organize my computer" to get started' disabled></textarea>
    <button id="send" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">CleanSlate AI never reads file contents &middot; metadata only &middot; all actions require your approval</p>
</footer>

<script>
const ADK  = '';
const APP  = 'cleanslate_ai_my_pc_assistant';
const USER = 'user';

const chat  = document.getElementById('chat');
const input = document.getElementById('input');
const send  = document.getElementById('send');

let sessionId    = null;
let pendingIid   = null;
let busy         = false;
let widgetActive = false;

function scrollBottom() { chat.scrollTop = chat.scrollHeight; }

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'agent' ? String.fromCodePoint(0x1F916) : String.fromCodePoint(0x1F464);
  const bub = document.createElement('div');
  bub.className = 'bubble';
  
  if (role === 'agent' && text && text.includes('__TABLE__\n')) {
    const parts = text.split('__TABLE__\n');
    
    // 1. Text before table
    if (parts[0].trim()) {
      const p = document.createElement('div');
      p.style.whiteSpace = 'pre-wrap';
      p.textContent = parts[0];
      bub.appendChild(p);
    }
    
    // 2. Parse and render table
    const rest = parts[1];
    const nl = rest.indexOf('\n');
    const jsonStr = nl >= 0 ? rest.slice(0, nl) : rest;
    const postText = nl >= 0 ? rest.slice(nl + 1) : '';
    
    try {
      const rawJson = JSON.parse(jsonStr);
      const tableData = rawJson.__TABLE__ ? rawJson.__TABLE__ : rawJson;
      const tableContainer = document.createElement('div');
      tableContainer.className = 'widget-table-container';
      
      const table = document.createElement('table');
      table.className = 'widget-table';
      
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      (tableData.columns || []).forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);
      
      const tbody = document.createElement('tbody');
      (tableData.rows || []).forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          if (typeof val === 'string' && (val.includes('/') || val.includes('\\'))) {
            td.title = val;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableContainer.appendChild(table);
      bub.appendChild(tableContainer);
    } catch(e) {
      // Fallback if parsing fails
      const fallbackDiv = document.createElement('div');
      fallbackDiv.style.whiteSpace = 'pre-wrap';
      fallbackDiv.textContent = text;
      bub.appendChild(fallbackDiv);
    }
    
    // 3. Text after table
    if (postText.trim()) {
      const p = document.createElement('div');
      p.style.whiteSpace = 'pre-wrap';
      p.style.marginTop = '10px';
      p.textContent = postText;
      bub.appendChild(p);
    }
  } else {
    bub.textContent = text;
  }
  
  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollBottom();
  return bub;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg agent typing';
  wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setReady(ok) {
  const inputOk = ok && !widgetActive;
  input.disabled = !inputOk;
  send.disabled  = !inputOk;
  busy = !ok;
  if (inputOk) input.focus();
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
send.addEventListener('click', handleSend);

/* ORGANIZE_MODE Widget System */

function parseInterruptMsg(msg) {
  if (!msg) return null;

  const segments = msg.split('\n');
  let tableData = null;
  let toggleData = null;
  let checkboxData = null;
  let checkboxLabel = '';

  for (let i = 0; i < segments.length; i++) {
    const line = segments[i];
    if (line.startsWith('__TABLE__')) {
      try {
        const rawJson = JSON.parse(segments[i + 1]);
        if (rawJson.__TABLE__) {
          tableData = rawJson.__TABLE__;
        } else {
          tableData = rawJson;
        }
      } catch (e) {}
    } else if (line.startsWith('__TOGGLE_SELECT__')) {
      try {
        toggleData = JSON.parse(segments[i + 1]);
      } catch (e) {}
    } else if (line.startsWith('__CHECKBOX_SELECT__')) {
      try {
        checkboxData = JSON.parse(segments[i + 1]);
        checkboxLabel = segments.slice(i + 2).join('\n');
      } catch (e) {}
    }
  }

  if (checkboxData) {
    return { type: 'checkbox', data: checkboxData, label: checkboxLabel };
  }
  if (tableData) {
    return { type: 'table_with_toggle', table: tableData, toggle: toggleData };
  }
  if (toggleData) {
    return { type: 'toggle', data: toggleData };
  }
  return null;
}

function dismissWidget() {
  const w = document.getElementById('active-widget');
  if (w) w.remove();
  widgetActive = false;
}

function renderCheckboxWidget(data, label, iid) {
  widgetActive = true;
  setReady(false);

  const subfolders = (data.subfolders || []);
  const count      = data.count || subfolders.length;
  const parent     = data.parent || '';
  const state      = subfolders.map(p => ({ path: p, checked: true }));

  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  wrap.id = 'active-widget';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);

  const card = document.createElement('div');
  card.className = 'widget-card';

  // Title: folder count
  const title = document.createElement('div');
  title.className = 'widget-title';
  title.textContent = String.fromCodePoint(0x1F4C1) + ' Select Folders to Organize (' + count + ' found)';
  card.appendChild(title);

  // Parent path subtitle
  if (parent) {
    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:12px;color:var(--text-dim);margin-bottom:10px;word-break:break-all;';
    sub.textContent = String.fromCodePoint(0x1F4CD) + ' Scanning: ' + parent;
    card.appendChild(sub);
  }

  const legend = document.createElement('div');
  legend.className = 'widget-legend';
  legend.innerHTML =
    '<span><span style="color:var(--success)">&#10003;</span>&nbsp;Organize this folder</span>' +
    '<span><span style="color:var(--danger)">&#10005;</span>&nbsp;Never touch</span>';
  card.appendChild(legend);

  const list = document.createElement('div');
  list.className = 'folder-list';
  card.appendChild(list);

  function buildItems() {
    list.innerHTML = '';
    state.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'folder-item ' + (item.checked ? 'checked' : 'unchecked');
      const parts = item.path.replace(/\\/g, '/').split('/');
      const name  = parts[parts.length - 1] || item.path;
      const cb = document.createElement('div');
      cb.className = 'folder-checkbox';
      cb.textContent = item.checked ? '\u2713' : '\u2715';
      const icon = document.createElement('div');
      icon.className = 'folder-icon';
      icon.textContent = String.fromCodePoint(0x1F4C1);
      const path = document.createElement('div');
      path.className = 'folder-path';
      path.title = item.path;
      path.textContent = name;
      const status = document.createElement('div');
      status.className = 'folder-status';
      status.textContent = item.checked ? 'Organize' : 'Skip';
      row.appendChild(cb);
      row.appendChild(icon);
      row.appendChild(path);
      row.appendChild(status);
      row.addEventListener('click', () => {
        state[idx].checked = !state[idx].checked;
        buildItems();
      });
      list.appendChild(row);
    });
  }

  buildItems();

  // "Try a different folder" button (always shown so user can correct the path)
  const rescanRow = document.createElement('div');
  rescanRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';
  const rescanBtn = document.createElement('button');
  rescanBtn.style.cssText = 'background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text-dim);font-family:inherit;font-size:12px;padding:6px 12px;cursor:pointer;';
  rescanBtn.textContent = '\uD83D\uDD04 Scan a different folder';
  rescanBtn.addEventListener('click', () => {
    dismissWidget();
    // Re-ask for parent_folder by sending a special token that the agent treats as a new path request
    addMsg('user', '(scanning a different folder)');
    // Send empty string + special signal — the agent step shows re-enter prompt
    runSSE('__RESCAN__');
  });
  rescanRow.appendChild(rescanBtn);
  card.appendChild(rescanRow);

  const submitBtn = document.createElement('button');
  submitBtn.className = 'widget-submit';
  submitBtn.id = 'widget-submit';
  submitBtn.textContent = 'Confirm Selection \u2192';
  submitBtn.addEventListener('click', () => {
    const organized   = state.filter(i => i.checked).map(i => i.path);
    const never_touch = state.filter(i => !i.checked).map(i => i.path);
    const selection   = JSON.stringify({ organized, never_touch });

    const orgNames  = organized.map(p => { const ps = p.replace(/\\/g,'/').split('/'); return String.fromCodePoint(0x1F4C1)+' '+(ps[ps.length-1]||p); });
    const skipNames = never_touch.map(p => { const ps = p.replace(/\\/g,'/').split('/'); return String.fromCodePoint(0x1F4C1)+' '+(ps[ps.length-1]||p); });
    const summary = [
      organized.length   ? '\u2714 Organize: ' + orgNames.join(', ')  : '',
      never_touch.length ? '\u2716 Skip: '     + skipNames.join(', ') : '',
    ].filter(Boolean).join('\n');

    dismissWidget();
    addMsg('user', summary || '(No folders selected)');
    runSSE(selection);
  });
  card.appendChild(submitBtn);

  wrap.appendChild(av);
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollBottom();
}

function renderToggleWidget(data, iid) {
  widgetActive = true;
  setReady(false);

  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  wrap.id = 'active-widget';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);

  const card = document.createElement('div');
  card.className = 'widget-card';

  const title = document.createElement('div');
  title.className = 'widget-title';
  title.textContent = data.question || 'Choose an option';
  card.appendChild(title);

  if (data.description) {
    const desc = document.createElement('div');
    desc.className = 'toggle-desc';
    desc.textContent = data.description;
    card.appendChild(desc);
  }

  const grid = document.createElement('div');
  grid.className = 'toggle-grid';

  (data.options || []).forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn ' + (idx === 0 ? 'primary' : 'secondary');
    btn.textContent = opt.label;
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.toggle-btn').forEach(b => b.disabled = true);
      dismissWidget();
      addMsg('user', opt.label);
      runSSE(opt.value);
    });
    grid.appendChild(btn);
  });

  card.appendChild(grid);
  wrap.appendChild(av);
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollBottom();
}

function renderTableWithToggleWidget(tableData, toggleData, iid) {
  widgetActive = true;
  setReady(false);

  const wrap = document.createElement('div');
  wrap.className = 'widget-wrap';
  wrap.id = 'active-widget';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = String.fromCodePoint(0x1F916);

  const card = document.createElement('div');
  card.className = 'widget-card';

  // 1. Render Table
  const tableContainer = document.createElement('div');
  tableContainer.className = 'widget-table-container';

  const table = document.createElement('table');
  table.className = 'widget-table';

  // Thead
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  (tableData.columns || []).forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // Tbody
  const tbody = document.createElement('tbody');
  (tableData.rows || []).forEach(row => {
    const tr = document.createElement('tr');
    row.forEach(val => {
      const td = document.createElement('td');
      td.textContent = val;
      if (typeof val === 'string' && (val.includes('/') || val.includes('\\'))) {
        td.title = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableContainer.appendChild(table);
  card.appendChild(tableContainer);

  // 2. Render Toggle buttons if present
  if (toggleData) {
    const title = document.createElement('div');
    title.className = 'widget-title';
    title.style.marginTop = '15px';
    title.textContent = toggleData.question || 'Choose an option';
    card.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'toggle-grid';

    (toggleData.options || []).forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'toggle-btn ' + (idx === 0 ? 'primary' : 'secondary');
      btn.textContent = opt.label;
      btn.addEventListener('click', () => {
        grid.querySelectorAll('.toggle-btn').forEach(b => b.disabled = true);
        dismissWidget();
        addMsg('user', opt.label);
        runSSE(opt.value);
      });
      grid.appendChild(btn);
    });
    card.appendChild(grid);
  }

  wrap.appendChild(av);
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollBottom();
}

/* SSE runner */
async function runSSE(message) {
  if (busy) return;
  busy = true;
  setReady(false);
  showTyping();

  const body = pendingIid !== null
    ? {
        app_name: APP, user_id: USER, session_id: sessionId,
        new_message:   { role: 'user', parts: [{ text: message }] },
        resume_inputs: { [pendingIid]: message }
      }
    : {
        app_name: APP, user_id: USER, session_id: sessionId,
        new_message: { role: 'user', parts: [{ text: message }] }
      };
  pendingIid = null;

  try {
    const resp = await fetch(ADK + '/run_sse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    removeTyping();

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let bestResponse = '';
    let requestMsg   = '';
    let requestIid   = null;
    // Track whether we've seen a structured output (prefer it over LLM text)
    let gotStructured = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const json = line.slice(5).trim();
        if (!json || json === '[DONE]') continue;
        let ev;
        try { ev = JSON.parse(json); } catch { continue; }

        // --- HITL interrupt (functionCall from ADK) ---
        const fc = ev && ev.content && ev.content.parts && ev.content.parts[0] && ev.content.parts[0].functionCall;
        if (fc) {
          const iid = fc.id || (fc.args && fc.args.interruptId);
          const msg = (fc.args && fc.args.message) || '';
          if (iid) {
            requestIid = iid;
            requestMsg = msg;
            // Once we know this is a HITL turn, stop using LLM text as response
            gotStructured = true;
          }
          continue;
        }

        // --- Older ADK interrupt format ---
        if (ev && (ev.type === 'request_input' || ev.interrupt_id)) {
          requestMsg = ev.message || ev.interrupt_message || '';
          requestIid = ev.interrupt_id || null;
          gotStructured = true;
          continue;
        }

        // --- Structured node output (most reliable, always prefer) ---
        const structOut =
          (ev && ev.output && ev.output.human_readable_report) ||
          (ev && ev.output && ev.output.message)               ||
          (ev && ev.output && ev.output.conversational_response) ||
          (ev && ev.output && ev.output.summary_report);

        if (structOut) {
          bestResponse = structOut;
          gotStructured = true;
          requestIid = null;
          requestMsg = '';
          continue;
        }

        // --- Fallback: LLM streaming text (only use if no structured output yet) ---
        if (!gotStructured) {
          const textOut = ev && ev.content && ev.content.parts && ev.content.parts[0] && ev.content.parts[0].text;
          if (textOut) bestResponse = textOut;
        }

        // --- Fallback: scan any output field for a usable string ---
        if (!gotStructured && ev && ev.output && typeof ev.output === 'object') {
          for (const val of Object.values(ev.output)) {
            if (typeof val === 'string' && val.trim().length > 20) { bestResponse = val; break; }
          }
        }
      }
    }

    if (requestIid !== null) {
      pendingIid = requestIid;
      const parsed = parseInterruptMsg(requestMsg);
      if (parsed && parsed.type === 'checkbox') {
        renderCheckboxWidget(parsed.data, parsed.label, requestIid);
      } else if (parsed && parsed.type === 'toggle') {
        renderToggleWidget(parsed.data, requestIid);
      } else if (parsed && parsed.type === 'table_with_toggle') {
        renderTableWithToggleWidget(parsed.table, parsed.toggle, requestIid);
      } else {
        if (requestMsg) addMsg('agent', requestMsg);
        setReady(true);
      }
    } else if (bestResponse) {
      addMsg('agent', bestResponse);
      setReady(true);
    } else {
      addMsg('agent', '(No response received. Please try again.)');
      setReady(true);
    }

  } catch (err) {
    removeTyping();
    addMsg('agent', String.fromCodePoint(0x26A0) + ' Connection error: ' + err.message);
    setReady(true);
  }

  busy = false;
}

async function handleSend() {
  const text = input.value.trim();
  if (!text || busy || widgetActive) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  await runSSE(text);
}
